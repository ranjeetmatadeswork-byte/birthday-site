<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Made With Love 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,500&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating hearts background -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- Petals -->
    <div class="petals" id="petals"></div>

    <div class="container">
        <div class="badge">✦ a little something ✦</div>
        <h1>Made With Love</h1>
        <div class="heart-divider">
            <span class="line"></span>
            <span class="big-heart">♡</span>
            <span class="line"></span>
        </div>
        <p class="byline">by <em>Ranjeet</em>, just for you</p>
        <p class="sub">every pixel made with love 🌹</p>
        <button onclick="goNext()">
            <span class="btn-inner">Open Your Gift 🎀</span>
        </button>
    </div>

    <script>
        function goNext() {
            const burst = document.createElement('div');
            burst.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;font-size:3rem;';
            burst.textContent = '💗';
            burst.style.animation = 'burstFade 0.8s ease forwards';
            document.head.insertAdjacentHTML('beforeend', '<style>@keyframes burstFade{0%{opacity:0;transform:scale(0.5)}50%{opacity:1;transform:scale(2.5)}100%{opacity:0;transform:scale(4)}}</style>');
            document.body.appendChild(burst);
            setTimeout(() => { window.location.href = "about.html"; }, 750);
        }

        // Generate floating hearts
        const heartsBg = document.getElementById('heartsBg');
        const heartChars = ['♡', '♥', '❤', '🤍', '💕', '💗', '💓'];
        for (let i = 0; i < 30; i++) {
            const h = document.createElement('span');
            h.classList.add('float-heart');
            h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (6 + Math.random() * 10) + 's';
            h.style.animationDelay = (Math.random() * 8) + 's';
            h.style.fontSize = (0.8 + Math.random() * 2) + 'rem';
            h.style.opacity = 0.15 + Math.random() * 0.3;
            heartsBg.appendChild(h);
        }

        // Generate falling petals
        const petalsEl = document.getElementById('petals');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.classList.add('petal');
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (8 + Math.random() * 8) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = (8 + Math.random() * 10) + 'px';
            p.style.height = (8 + Math.random() * 10) + 'px';
            petalsEl.appendChild(p);
        }
    </script>
</body>
</html>
